# Robot tracking with the ray-visibility term enabled (the robot arm acts
# as the occluder geometry). Training this configuration alongside the
# default (which uses ``use_visibility: false``) and comparing their
# tracking accuracy quantifies the value of modeling view-dependent
# occlusion.

design_space:
  low:  [-1.0, -1.0, 1.0, 0.0,  -1.57, 0.1]
  high: [ 1.0,  1.0, 1.0, 6.28,  0.0,  2.0]

target:
  sigma: 0.025
  use_visibility: true
  visibility_num_samples: 16
  visibility_beta: 100.0
  visibility_weight: 1.0

scene:
  source: sphere
  num_trajectories: 20
  trajectory_variance: [0.1, 0.1]
  steps_per_segment: 10
  sphere_radius: 0.02
  seed: 42
  occluder: robot

flow:
  num_layers: 8
  circular_dims: [3, 4]
  spline:
    num_blocks: 2
    hidden_channels: 64
    num_bins: 16
    tail_bound_multiplier: 1.0
    activation: ReLU
    dropout: 0.05
    permute_mask: true
    init_identity: true

training:
  iterations: 5000
  batch_size: 1024
  learning_rate: 0.001
  entropy_reg: 0.5
  # Ramp the visibility weight from 0 to its final value over the first
  # 1000 iterations so the flow first learns to place rays on surfaces
  # and only then is penalized for occluded paths.
  visibility_warmup_iters: 1000

synthesis:
  n_components: 4
  origin_mode: full
  max_origin_thickness: 0.1
  em_max_iter: 400
  em_seed: 0
  flow_samples: 8192

evaluation:
  num_test_trajectories: 40
  test_seed: 1000
  # Smaller ray budgets are sufficient when the visibility term is active
  # (the ablation sweeps 60-190 rays).
  ray_budgets: [60, 70, 80, 90, 100, 110, 120,
                130, 140, 150, 160, 170, 180, 190]

output:
  run_dir: outputs/runs/robot_tracking/with_visibility
  log_every: 100
  save_every: 1000
